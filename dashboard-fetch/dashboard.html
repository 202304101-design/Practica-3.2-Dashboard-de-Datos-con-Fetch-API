<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Dashboard de Usuarios</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>
<h1>Dashboard de Usuarios</h1>
<p class="descripcion">Datos obtenidos desde una API utilizando Fetch API</p>

<div id="estado"></div>
</header>

<section class="controles">

<input type="search" id="busqueda" placeholder="Buscar usuario...">

<button id="btnCargar">Cargar Usuarios</button>

<button id="btnLimpiar">Limpiar</button>

</section>

<div id="spinner" hidden>
<p>⏳ Cargando datos...</p>
</div>

<section id="contenedor-usuarios"></section>

<script type="module" src="dashboard.js"></script>

</body>
</html>
